services:
  - type: web
    name: hos-stripe-bridge
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: "npm start"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAYMENT_PROVIDER
        value: stripe
      - key: CRM_PROVIDER
        value: estage
      - key: EMAIL_PROVIDER
        value: getresponse
      - key: FULFILLMENT_PROVIDER
        value: render
      - key: CHECKOUT_MODE
        value: external
      - key: ENABLE_ESTATE_SYNC
        value: false
      - key: ENABLE_GETRESPONSE_SYNC
        value: false
      - key: ENABLE_REAL_FULFILLMENT
        value: false
      - key: STRIPE_MODE
        value: test
      - key: GETRESPONSE_BASE_URL
        value: https://api.getresponse.com/v3
      - key: HOS_GETRESPONSE_CAMPAIGN_ID
        value: f12ji
      - key: HOS_BUYER_TAG_ID
        value: 4P1aD
      - key: HOS_DECLINED_TAG_ID
        sync: false
      - key: STRIPE_PAYMENT_LINK_ID
        value: plink_1TcIvYDfPgr5wAVlitvX7U2C
      - key: STRIPE_ENVIRONMENT
        value: test
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_QUICKSTART_PRICE_ID
        sync: false
      - key: QUICKSTART_SUCCESS_URL
        value: https://herculeswellness.club/start-thank-you-buyer?session_id={CHECKOUT_SESSION_ID}
      - key: QUICKSTART_CANCEL_URL
        value: https://herculeswellness.club/start-thank-you-declined?checkout=cancelled
      - key: QUICKSTART_ACCESS_URL
        sync: false
      - key: GETRESPONSE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
